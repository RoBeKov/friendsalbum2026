<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">

  <!-- Sky -->
  <rect width="1200" height="700" fill="#cfefff"></rect>

  <!-- Mountains -->
  <polygon points="0,500 300,250 600,500" fill="#6fa8dc"></polygon>
  <polygon points="400,500 750,200 1100,500" fill="#3d85c6"></polygon>
  <polygon points="800,500 1050,300 1200,500" fill="#2b78e4"></polygon>

  <!-- Ground -->
  <rect y="500" width="1200" height="200" fill="#93c47d"></rect>

  <!-- Sun -->
  <circle cx="1000" cy="120" r="60" fill="#ffd966"></circle>

  <!-- Boy 1 -->
  <circle cx="300" cy="430" r="40" fill="#f6b26b"></circle>
  <rect x="270" y="470" width="60" height="100" fill="#6d9eeb"></rect>
  <line x1="270" y1="500" x2="230" y2="540" stroke="black" stroke-width="5"></line>
  <line x1="330" y1="500" x2="370" y2="540" stroke="black" stroke-width="5"></line>
  <line x1="290" y1="570" x2="290" y2="620" stroke="black" stroke-width="5"></line>
  <line x1="310" y1="570" x2="310" y2="620" stroke="black" stroke-width="5"></line>

  <!-- Girl 1 -->
  <circle cx="500" cy="430" r="40" fill="#f9cb9c"></circle>
  <rect x="470" y="470" width="60" height="100" fill="#e06666"></rect>
  <line x1="470" y1="500" x2="430" y2="540" stroke="black" stroke-width="5"></line>
  <line x1="530" y1="500" x2="570" y2="540" stroke="black" stroke-width="5"></line>
  <line x1="490" y1="570" x2="490" y2="620" stroke="black" stroke-width="5"></line>
  <line x1="510" y1="570" x2="510" y2="620" stroke="black" stroke-width="5"></line>

  <!-- Boy 2 -->
  <circle cx="700" cy="430" r="40" fill="#f6b26b"></circle>
  <rect x="670" y="470" width="60" height="100" fill="#93c47d"></rect>
  <line x1="670" y1="500" x2="630" y2="540" stroke="black" stroke-width="5"></line>
  <line x1="730" y1="500" x2="770" y2="540" stroke="black" stroke-width="5"></line>
  <line x1="690" y1="570" x2="690" y2="620" stroke="black" stroke-width="5"></line>
  <line x1="710" y1="570" x2="710" y2="620" stroke="black" stroke-width="5"></line>

  <!-- Title -->
  <text x="600" y="80" font-size="50" text-anchor="middle" fill="#333" font-family="Arial">
    Приятелски албум
  </text>

</svg>